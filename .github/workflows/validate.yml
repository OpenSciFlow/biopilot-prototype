name: Validate run records

on:
  pull_request:
  push:
    branches: [main]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: python -m pip install --upgrade pip jsonschema
      - run: python scripts/validate_demo_request.py
      - run: python scripts/validate_plan_response.py
      - run: python scripts/validate_run_records.py
